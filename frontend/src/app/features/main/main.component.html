@if (products()?.length) {
<div
  class="py-5 px-25 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"
>
  @for (product of products(); track product.id) {
  <app-product-card [product]="product"></app-product-card>
  }
</div>
} @else {
<div class="flex flex-col items-center justify-center min-h-[60vh]">
  <span class="loading loading-infinity loading-xl text-primary"></span>
  <p class="mt-6 text-lg text-primary">Loading Products...</p>
</div>
}
