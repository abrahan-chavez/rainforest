<div class="container mx-auto px-4 py-4">
  <div class="flex flex-row items-center justify-between py-5">
    <div class="stats shadow flex flex-row items-center justify-between w-full">
      <div class="stat">
        <div class="stat-figure text-primary">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            class="inline-block h-8 w-8 stroke-current"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"
            ></path>
          </svg>
        </div>
        <div class="stat-title">Total Orders</div>
        <div class="stat-value text-primary">25.6K</div>
        <div class="stat-desc">21% more than last month</div>
      </div>
      <div class="stat">
        <div class="stat-figure text-secondary">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            class="inline-block h-8 w-8 stroke-current"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M13 10V3L4 14h7v7l9-11h-7z"
            ></path>
          </svg>
        </div>
        <div class="stat-title">Active Hashrate</div>
        <div class="stat-value text-secondary">29.6PH/s</div>
        <div class="stat-desc">21% more than last month</div>
      </div>
      <div class="stat">
        <div class="stat-figure text-info">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            class="inline-block h-8 w-8 stroke-current"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"
            ></path>
          </svg>
        </div>
        <div class="stat-title">Average Order Completion Rate</div>
        <div class="stat-value text-info">86%</div>
        <div class="stat-desc">31 orders outstanding</div>
      </div>
    </div>
  </div>
  <div class="flex flex-row gap-6 mt-8 min-h-[150px]">
    <button
      class="btn btn-outline btn-primary flex-1"
      [routerLink]="['/admin/products']"
    >
      Manage Products
      <span class="badge badge-primary ml-2">{{ productsCount() }}</span>
    </button>
    <button
      class="btn btn-outline btn-secondary flex-1"
      [routerLink]="['/admin/orders']"
    >
      Manage Orders
      <span class="badge badge-secondary ml-2">{{ ordersCount() }}</span>
    </button>
  </div>
</div>
