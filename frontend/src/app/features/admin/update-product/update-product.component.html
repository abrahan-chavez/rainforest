<div class="container mx-auto p-4">
  <h1 class="text-2xl font-bold mb-4">Create New Product</h1>

  <form (ngSubmit)="submit()" class="space-y-4">
    <div>
      <label class="label">
        <span class="label-text">Product Name</span>
      </label>
      <input
        type="text"
        [(ngModel)]="productName"
        name="productName"
        class="input input-bordered w-full"
        required
      />
    </div>
    <div>
      <label class="label">
        <span class="label-text">Product Price (USD)</span>
      </label>
      <input
        type="number"
        [(ngModel)]="productPrice"
        name="productPrice"
        class="input input-bordered w-full"
        required
      />
    </div>
    <p class="text-sm">
      (Approximately {{ hashTime() | number : "1.1-2" }} hashing days)
    </p>
    <div>
      <label class="label">
        <span class="label-text">Stock Quantity</span>
      </label>
      <input
        type="number"
        [(ngModel)]="stockQuantity"
        name="stockQuantity"
        step="1"
        class="input input-bordered w-full"
        required
      />
    </div>
    <div>
      <label class="label">
        <span class="label-text">Product Description</span>
      </label>
      <textarea
        [(ngModel)]="productDescription"
        name="productDescription"
        class="textarea textarea-bordered w-full"
        required
      ></textarea>
    </div>

    <div>
      <label class="label">
        <span class="label-text">Product Image URL</span>
      </label>
      <input
        type="text"
        [(ngModel)]="productImageUrl"
        name="productImageUrl"
        class="input input-bordered w-full"
      />
    </div>

    <div class="flex items-center">
      <label class="label cursor-pointer">
        <input
          type="checkbox"
          [(ngModel)]="shippingRequired"
          name="shippingRequired"
          class="toggle"
        />
        <span class="label-text">Shipping Required</span>
      </label>
    </div>

    <button type="submit" class="btn btn-primary" [disabled]="!valid()">
      Save Product
    </button>
  </form>
</div>
