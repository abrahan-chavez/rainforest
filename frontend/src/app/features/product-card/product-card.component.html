<!-- DaisyUI Product Card Component -->
<div
  class="card bg-base-200 shadow-md hover:shadow-lg transition-all duration-300 h-full flex flex-col hover:-translate-y-1"
>
  <figure class="aspect-square overflow-hidden">
    <img
      [src]="product().image"
      [alt]="product().name"
      class="w-full h-full object-cover transition-transform duration-500 hover:scale-105"
      loading="lazy"
    />
  </figure>
  <div class="card-body flex flex-col flex-grow p-5">
    <h3
      class="card-title text-lg font-semibold mb-3 line-clamp-2 min-h-[3.5rem]"
    >
      {{ product().name }}
    </h3>
    <div class="mt-auto space-y-3">
      <div
        class="w-fit bg-primary/10 text-primary px-5 py-1.5 rounded-full flex items-center"
      >
        <span class="material-symbols-rounded mr-1.5 text-primary">bolt</span>
        <span class="font-medium">
          {{ formatHashes(product().priceInAcceptedShares!) }} shares
        </span>
      </div>
      <div
        class="w-fit px-5 rounded-full flex items-center"
      >
        <span class="material-symbols-rounded mr-1.5">attach_money</span>
        <span class="font-medium">
          {{ product().priceUSD.toFixed(2) }} value
        </span>
      </div>
      <a
        [routerLink]="['products/', product().id]"
        class="btn btn-primary w-full mt-4 font-medium"
      >
        View Details
      </a>
    </div>
  </div>
</div>
