<!-- DaisyUI Product Card Component -->
<div
  class="card bg-base-200 shadow-md hover:shadow-lg transition-transform duration-300 h-full flex flex-col hover:-translate-y-1"
>
  <figure class="aspect-square overflow-hidden">
    <img
      [src]="product().image"
      [alt]="product().name"
      class="w-full h-full object-cover transition-transform duration-500 hover:scale-105"
      loading="lazy"
    />
  </figure>
  <div class="card-body flex flex-col flex-grow p-5">
    <h3
      class="card-title text-lg font-semibold mb-2 line-clamp-2 min-h-[3.5rem]"
    >
      {{ product().name }}
    </h3>

    <!-- Hashing days & Stock aligned side by side -->
    <div class="flex items-center justify-between mb-4 space-x-4">
      <div
        class="flex items-center bg-primary/10 text-primary px-4 py-1.5 rounded-full"
      >
        <span class="material-symbols-rounded mr-1 text-primary">bolt</span>
        <span class="font-medium text-sm">
          ~{{ fetchHashTime().toFixed(2) }} hashing days
        </span>
      </div>
    </div>

    <div class="mt-auto space-y-3">
      <div class="flex items-center w-fit px-4 py-1 rounded-full">
        <span class="material-symbols-rounded mr-1">attach_money</span>
        <span class="font-medium text-sm">
          {{ product().priceUSD.toFixed(2) }} value
        </span>
      </div>

      <!-- Buy Button -->
      <button
        class="btn btn-primary w-full mt-4 font-medium"
        [disabled]="product().stockQuantity === 0"
        (click)="onBuy(product().id)"
      >
        {{ product().stockQuantity > 0 ? 'Buy' : 'Out of Stock' }}
      </button>
    </div>
  </div>
</div>
