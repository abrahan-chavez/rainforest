version: "3.9"

services:
  # ‑‑‑ Bitcoin full node (regtest) ‑‑‑
  bitcoin:
    build: ./bitcoin
    volumes:
      - ./bitcoin/bitcoin.conf:/home/bitcoin/.bitcoin/bitcoin.conf
    ports:
      - "18443:18443"
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "
      bitcoind -regtest -conf=/home/bitcoin/.bitcoin/bitcoin.conf -daemon &&
      sleep 3 &&
      bitcoin-cli -regtest -rpcuser=rainforrest -rpcpassword=devpassword createwallet rainforrest || true &&
      tail -f /dev/null
      "
    restart: unless-stopped

  # ‑‑‑ DATUM Gateway – public Stratum endpoint ‑‑‑
  datum:
    build: ./datum
    environment:
      - BITCOIN_RPC_USER=rainforrest
      - BITCOIN_RPC_PASS=devpassword
      - BITCOIN_RPC_URL=http://rainforrest:devpassword@bitcoin:18443
      - ASPNETCORE_URLS=http://0.0.0.0:8080
    ports:
      - "23334:23334"     # Stratum V1 for miners
      - "8080:8080"       # DATUM web/API UI
    depends_on:
      - bitcoin
    restart: unless-stopped

  # ‑‑‑ Redis for share tracking ‑‑‑
  redis:
    build: ./redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # ‑‑‑ FastAPI backend for front‑end polling ‑‑‑
  api:
    build: ./api
    environment:
      REDIS_HOST: redis
      DATUM_BASE_URL: http://datum:8080
      REDIS_PORT: 6379
      ASPNETCORE_URLS: http://0.0.0.0:5030
    depends_on:
      - redis
    ports:
      - "5030:5030"
    restart: unless-stopped

  # ‑‑‑ Static front‑end (React/Next/Vite build) ‑‑‑
  frontend:
    build: ./frontend
    depends_on:
      - api
    ports:
      - "80:80"
    restart: unless-stopped
    
  cpuminer:
    build: ./cpuminer
    depends_on:
      - datum
    restart: unless-stopped
    environment:
      STRATUM_URL: stratum+tcp://datum:23334
      WORKER_NAME: worker_d044f7d362ff4e099100df02031f2a78

volumes:
  btc_data: