version: "3.9"

services:
  # ‑‑‑ Bitcoin full node (regtest) ‑‑‑
  bitcoin:
    build: ./bitcoin
    volumes:
      - ./bitcoin/bitcoin.conf:/home/bitcoin/.bitcoin/bitcoin.conf
    ports:
      - "18443:18443"
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "
      bitcoind -regtest -conf=/home/bitcoin/.bitcoin/bitcoin.conf -daemon &&
      sleep 3 &&
      bitcoin-cli -regtest -rpcuser=rainforrest -rpcpassword=devpassword createwallet rainforrest || true &&
      tail -f /dev/null
      "
    restart: unless-stopped

  # ‑‑‑ DATUM Gateway – public Stratum endpoint ‑‑‑
  datum:
    build: ./datum
    environment:
      - BITCOIN_RPC_USER=rainforrest
      - BITCOIN_RPC_PASS=devpassword
      - BITCOIN_RPC_URL=http://rainforrest:devpassword@bitcoin:18443
    ports:
      - "23334:23334"     # Stratum V1 for miners
      - "8080:8080"       # DATUM web/API UI
    depends_on:
      - bitcoin
    restart: unless-stopped

  # ‑‑‑ Redis for share tracking ‑‑‑
  redis:
    build: ./redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # ‑‑‑ Share‑tracker microservice ‑‑‑
  tracker:
    build: ./tracker
    environment:
      DATUM_API: "http://datum:8080/api/clients"
      REDIS_HOST: redis
      HASHRATE_TARGET_DIFF: "1000"     # diff target per order (adjust)
      DATUM_USER: "admin"
      DATUM_PASS: "demo"
    depends_on:
      - datum
      - redis
    restart: unless-stopped

  # ‑‑‑ FastAPI backend for front‑end polling ‑‑‑
  api:
    build: ./api
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
    ports:
      - "8000:8000"
    restart: unless-stopped

  # ‑‑‑ Static front‑end (React/Next/Vite build) ‑‑‑
  frontend:
    build: ./frontend
    depends_on:
      - api
    ports:
      - "80:80"
    restart: unless-stopped
    
  cpuminer:
    build: ./cpuminer
    depends_on:
      - datum
    restart: unless-stopped
    environment:
      STRATUM_URL: stratum+tcp://datum:23334
      WORKER_NAME: demo.order-cpuminer

volumes:
  btc_data: