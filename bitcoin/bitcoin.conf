# Bitcoin Core config used by the Rainforrest demo node
# We run `bitcoind -regtest` from the Dockerfile, so this file
# does **not** contain regtest=1 (network selection happens via CLI).

# Global settings (apply on all networks)
server=1
rpcuser=rainforrest
rpcpassword=devpassword
fallbackfee=0.0002

# Regtest‑specific settings
[regtest]
# txindex lets DATUM pull historical block data for templates
# You can disable it for faster startup if you only mine new blocks.
txindex=1

# Expose RPC on 0.0.0.0 so other containers can reach it inside Docker
rpcbind=0.0.0.0
rpcallowip=0.0.0.0/0
# Default regtest RPC port is 18443; override if you need a custom port
rpcport=18443